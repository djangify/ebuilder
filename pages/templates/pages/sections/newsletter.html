<section class="py-16 bg-[color:var(--color-primary)] text-[var(--color-primary-contrast)] text-center">

    {% if block.title %}
        <h2 class="text-3xl font-bold mb-4">{{ block.title }}</h2>
    {% endif %}

    {% if block.intro_text %}
        <div class="mb-6 text-[var(--color-primary-contrast)]">
            {{ block.intro_text|safe }}
        </div>
    {% endif %}

    <div>
        {{ block.embed_html|safe }}
    </div>

</section>
