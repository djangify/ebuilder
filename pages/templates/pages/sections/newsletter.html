<style>

.ml-form-embedWrapper {
    background: transparent !important;
    box-shadow: none !important;
}

/* make the form horizontal */
/* responsive horizontal layout */
.ml-form-formContent {
    display: flex !important;
    flex-wrap: wrap !important;
    gap: 12px !important;
    align-items: center !important;
    justify-content: center !important;
}

/* make each field flexible */
.ml-form-fieldRow {
    flex: 1 1 180px !important;
    margin: 0 !important;
}

/* button width control */
.ml-form-embedSubmit {
    flex: 0 0 auto !important;
}

/* inputs fill their column */
.ml-form-fieldRow input {
    width: 100% !important;
}

/* mobile stacking */
@media (max-width: 640px) {

    .ml-form-formContent {
        flex-direction: column !important;
        align-items: stretch !important;
    }

    .ml-form-embedSubmit button {
        width: 100% !important;
    }

}


/* remove MailerLite stacked layout */
.ml-form-fieldRow {
    margin: 0 !important;
}

/* inputs */
.ml-form-fieldRow input {
    background: transparent !important;
    border: 1px solid white !important;
    color: white !important;
    padding: 10px 14px !important;
    border-radius: 4px !important;
}

/* placeholder text */
.ml-form-fieldRow input::placeholder {
    color: rgba(255,255,255,0.7);
}

/* button */
.ml-form-embedSubmit button {
    border: 1px solid white !important;
    background: transparent !important;
    color: white !important;
    padding: 10px 20px !important;
    border-radius: 4px !important;
}

.ml-form-embedSubmit button:hover {
    background: white !important;
    color: #0b1a34 !important;
}

/* remove privacy text spacing */
.ml-form-embedPermissions {
    display: none;
}

</style>
<section class="py-16 bg-[color:var(--color-primary)] text-[var(--color-primary-contrast)] text-center">

    {% if block.title %}
        <h2 class="text-3xl font-bold mb-4">{{ block.title }}</h2>
    {% endif %}

    {% if block.intro_text %}
        <p class="mb-6 text-[var(--color-primary-contrast)]">
            {{ block.intro_text }}
        </p>
    {% endif %}

    <div>
        {{ block.embed_html|safe }}
    </div>

</section>
