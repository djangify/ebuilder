services:
  web:
    build: .
    container_name: ecommercebuilder_web
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data/db:/app/db
      - ./data/media:/app/media
      - ./data/logs:/app/logs
      - ./staticfiles:/app/staticfiles
    ports:
      - "127.0.0.1:8950:8000"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8950/health/" ]
      interval: 30s
      timeout: 10s
      retries: 5
